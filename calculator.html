<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☄️ 星陨伤害计算器</title>
<style>
/* ============ CSS Variables ============ */
:root {
  --bg-primary: #080c1a;
  --bg-secondary: #0d1229;
  --glass-bg: rgba(255,255,255,0.05);
  --glass-border: rgba(255,255,255,0.1);
  --glass-blur: 16px;
  --text-primary: #e8e8f0;
  --text-secondary: #8888aa;
  --accent-cyan: #00e5ff;
  --accent-gold: #ffd700;
  --accent-red: #ff3b3b;
  --accent-orange: #ff8c00;
  --accent-green: #00e676;
  --seal-glow-color: rgba(100,140,255,0.3);
  --seal-glow-size: 10px;
  --seal-pulse-speed: 3s;
  --atmosphere-color: transparent;
  --atmosphere-intensity: 0;
  --hp-bar-color: var(--accent-green);
  --danger-level: 0;
}

/* ============ Reset & Base ============ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* ============ Star Background ============ */
#star-canvas {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* ============ Atmosphere Overlay ============ */
#atmosphere-overlay {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
  pointer-events: none;
  background: var(--atmosphere-color);
  opacity: var(--atmosphere-intensity);
  transition: all 0.8s ease;
}

/* ============ Main Container ============ */
.container {
  position: relative;
  z-index: 2;
  max-width: 1100px;
  margin: 0 auto;
  padding: 30px 20px 60px;
}

/* ============ Header ============ */
.header {
  text-align: center;
  margin-bottom: 40px;
}
.header h1 {
  font-size: 1.8rem;
  font-weight: 300;
  letter-spacing: 4px;
  color: var(--text-primary);
}
.header h1 span { color: var(--accent-gold); font-weight: 600; }
.header .subtitle {
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-top: 6px;
  letter-spacing: 1px;
}

/* ============ Battle Area ============ */
.battle-area {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 24px;
  align-items: start;
  margin-bottom: 40px;
}

/* ============ Glass Panel ============ */
.glass-panel {
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur)) saturate(150%);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(150%);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  padding: 24px;
  transition: all 0.3s ease;
}
.glass-panel:hover {
  border-color: rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.07);
}

/* ============ Spirit Panel ============ */
.spirit-panel { min-height: 400px; }
.spirit-panel .panel-label {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-secondary);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.spirit-panel .panel-label .icon { font-size: 1rem; }

/* Spirit Select Button */
.spirit-select {
  width: 100%;
  padding: 16px;
  background: rgba(255,255,255,0.03);
  border: 1px dashed rgba(255,255,255,0.15);
  border-radius: 12px;
  color: var(--text-secondary);
  font-size: 0.95rem;
  cursor: pointer;
  transition: all 0.3s ease;
  text-align: center;
}
.spirit-select:hover {
  border-color: var(--accent-cyan);
  color: var(--accent-cyan);
  background: rgba(0,229,255,0.05);
}

/* Spirit Card (selected) */
.spirit-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}
.spirit-card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.2); }
.spirit-card .emoji { font-size: 3rem; margin-bottom: 8px; display: block; }
.spirit-card .name { font-size: 1.1rem; font-weight: 600; margin-bottom: 4px; }
.spirit-card .element-tag {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 0.75rem;
  margin-bottom: 12px;
}
.spirit-card .stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  font-size: 0.8rem;
}
.spirit-card .stat { text-align: center; }
.spirit-card .stat-label { color: var(--text-secondary); font-size: 0.7rem; }
.spirit-card .stat-value { font-weight: 600; font-size: 0.95rem; }
.spirit-card .change-hint {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 6px;
  background: rgba(0,229,255,0.1);
  font-size: 0.7rem;
  color: var(--accent-cyan);
  opacity: 0;
  transition: opacity 0.3s;
}
.spirit-card:hover .change-hint { opacity: 1; }

/* Element colors */
.el-fire { --el-color: #ff4444; --el-bg: rgba(255,68,68,0.15); }
.el-water { --el-color: #4488ff; --el-bg: rgba(68,136,255,0.15); }
.el-grass { --el-color: #44cc44; --el-bg: rgba(68,204,68,0.15); }
.el-electric { --el-color: #ffcc00; --el-bg: rgba(255,204,0,0.15); }
.el-dark { --el-color: #aa66ff; --el-bg: rgba(170,102,255,0.15); }
.el-light { --el-color: #ffeedd; --el-bg: rgba(255,238,221,0.15); }

.element-tag {
  background: var(--el-bg);
  color: var(--el-color);
  border: 1px solid var(--el-color);
}
.spirit-card { border-top: 3px solid var(--el-color, var(--glass-border)); }

/* ============ Skill Selection ============ */
.skills-section {
  margin-top: 20px;
}
.skills-section .section-title {
  font-size: 0.75rem;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
}
.skill-list { display: flex; flex-direction: column; gap: 8px; }
.skill-btn {
  width: 100%;
  padding: 10px 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  color: var(--text-primary);
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.25s ease;
  display: flex;
  justify-content: space-between;
  align-items: center;
  text-align: left;
}
.skill-btn:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.2);
  transform: translateX(4px);
}
.skill-btn.active {
  background: rgba(0,229,255,0.1);
  border-color: var(--accent-cyan);
  box-shadow: 0 0 12px rgba(0,229,255,0.15);
}
.skill-btn .skill-name { font-weight: 500; }
.skill-btn .skill-power {
  font-size: 0.75rem;
  color: var(--text-secondary);
  background: rgba(255,255,255,0.05);
  padding: 2px 8px;
  border-radius: 6px;
}
.skill-btn.active .skill-power {
  background: rgba(0,229,255,0.15);
  color: var(--accent-cyan);
}

/* Defense skill - none option */
.skill-btn.none-skill {
  border-style: dashed;
}
.skill-btn.none-skill.active {
  border-style: solid;
}

/* ============ Star Seal (Center) ============ */
.seal-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  padding-top: 20px;
}
.seal-label {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-secondary);
}
.seal-wrapper {
  position: relative;
  width: 200px;
  height: 200px;
  cursor: ns-resize;
  user-select: none;
  -webkit-user-select: none;
}
.seal-wrapper canvas {
  position: absolute;
  top: -40px; left: -40px;
  width: 280px; height: 280px;
  pointer-events: none;
}

/* The seal itself */
.seal {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: box-shadow 0.5s ease;
  box-shadow:
    0 0 var(--seal-glow-size) var(--seal-glow-color),
    0 0 calc(var(--seal-glow-size) * 2) var(--seal-glow-color),
    0 0 calc(var(--seal-glow-size) * 4) var(--seal-glow-color);
  animation: seal-pulse var(--seal-pulse-speed) ease-in-out infinite;
}

.seal svg {
  width: 100%;
  height: 100%;
  position: absolute;
  top: 0; left: 0;
}

.seal-number {
  position: relative;
  z-index: 2;
  font-size: 2.8rem;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--text-primary);
  text-shadow: 0 0 20px var(--seal-glow-color);
  transition: all 0.3s ease;
  font-family: 'Courier New', monospace;
}

.seal-hint {
  font-size: 0.7rem;
  color: var(--text-secondary);
  text-align: center;
  line-height: 1.6;
}

/* Slider below seal */
.seal-slider-container {
  width: 200px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.seal-slider {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 4px;
  border-radius: 2px;
  background: rgba(255,255,255,0.1);
  outline: none;
  transition: all 0.3s;
}
.seal-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--accent-cyan);
  cursor: pointer;
  box-shadow: 0 0 8px rgba(0,229,255,0.5);
  transition: all 0.2s;
}
.seal-slider::-webkit-slider-thumb:hover {
  transform: scale(1.3);
  box-shadow: 0 0 16px rgba(0,229,255,0.8);
}
.seal-slider::-moz-range-thumb {
  width: 16px; height: 16px;
  border-radius: 50%; border: none;
  background: var(--accent-cyan);
  cursor: pointer;
  box-shadow: 0 0 8px rgba(0,229,255,0.5);
}
.slider-labels {
  display: flex;
  justify-content: space-between;
  width: 100%;
  font-size: 0.65rem;
  color: var(--text-secondary);
}

/* Bonus display */
.seal-bonus {
  font-size: 0.85rem;
  color: var(--accent-gold);
  font-weight: 500;
  text-align: center;
  padding: 6px 16px;
  background: rgba(255,215,0,0.08);
  border: 1px solid rgba(255,215,0,0.2);
  border-radius: 20px;
  transition: all 0.3s;
}

/* ============ VS Badge ============ */
.vs-connector {
  display: none; /* hidden on desktop, the seal replaces it */
}

/* ============ Result Area ============ */
.result-area {
  margin-top: 10px;
}
.result-card {
  background: var(--glass-bg);
  backdrop-filter: blur(20px) saturate(150%);
  -webkit-backdrop-filter: blur(20px) saturate(150%);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 32px;
  text-align: center;
  transition: all 0.6s ease;
  position: relative;
  overflow: hidden;
}
.result-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at center, var(--atmosphere-color), transparent 70%);
  opacity: 0.3;
  pointer-events: none;
  transition: all 0.8s;
}

.result-label {
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: var(--text-secondary);
  margin-bottom: 12px;
  position: relative;
}

/* The big percentage number */
.result-percentage {
  font-size: 4rem;
  font-weight: 800;
  font-family: 'Courier New', monospace;
  font-variant-numeric: tabular-nums;
  line-height: 1;
  margin-bottom: 16px;
  position: relative;
  transition: all 0.5s ease;
  background: linear-gradient(135deg, var(--hp-bar-color), var(--accent-gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.result-percentage .percent-sign {
  font-size: 2rem;
  font-weight: 400;
}

/* HP Bar */
.hp-bar-container {
  max-width: 500px;
  margin: 0 auto 16px;
  position: relative;
}
.hp-bar-bg {
  width: 100%;
  height: 28px;
  background: rgba(255,255,255,0.06);
  border-radius: 14px;
  overflow: hidden;
  position: relative;
  border: 1px solid rgba(255,255,255,0.08);
}
.hp-bar-fill {
  height: 100%;
  border-radius: 14px;
  background: var(--hp-bar-color);
  transition: width 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94),
              background 0.5s ease;
  position: relative;
  box-shadow: 0 0 10px var(--hp-bar-color);
}
.hp-bar-fill::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 50%;
  background: linear-gradient(to bottom, rgba(255,255,255,0.2), transparent);
  border-radius: 14px 14px 0 0;
}
.hp-bar-damage {
  position: absolute;
  top: 0; right: 0;
  height: 100%;
  background: rgba(255,60,60,0.3);
  border-radius: 0 14px 14px 0;
  transition: width 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.2s;
}
.hp-bar-text {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 0.75rem;
  font-weight: 600;
  text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  z-index: 2;
  white-space: nowrap;
}

/* Result details */
.result-numbers {
  font-size: 1rem;
  color: var(--text-secondary);
  position: relative;
}
.result-numbers .damage-value {
  font-weight: 700;
  font-size: 1.3rem;
  color: var(--text-primary);
  font-family: 'Courier New', monospace;
}
.result-numbers .hp-value {
  font-family: 'Courier New', monospace;
}

/* Kill confirmation */
.kill-banner {
  display: none;
  margin-top: 16px;
  padding: 12px 24px;
  background: rgba(255,59,59,0.15);
  border: 1px solid rgba(255,59,59,0.4);
  border-radius: 12px;
  color: var(--accent-red);
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: 2px;
  position: relative;
  animation: kill-flash 0.5s ease-out;
}
.kill-banner.show { display: block; }
.kill-banner .overflow-damage {
  font-size: 0.85rem;
  font-weight: 400;
  color: var(--text-secondary);
  margin-top: 4px;
}

/* Waiting state */
.result-waiting {
  padding: 40px;
  color: var(--text-secondary);
  font-size: 0.9rem;
}

/* ============ Breakdown ============ */
.breakdown-toggle {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 16px;
  padding: 10px;
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 0.8rem;
  cursor: pointer;
  transition: color 0.3s;
  width: 100%;
}
.breakdown-toggle:hover { color: var(--text-primary); }
.breakdown-toggle .arrow {
  transition: transform 0.3s;
  font-size: 0.7rem;
}
.breakdown-toggle.open .arrow { transform: rotate(180deg); }

.breakdown-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}
.breakdown-content.open { max-height: 400px; }
.breakdown-list {
  padding: 16px 24px;
  text-align: left;
  font-size: 0.82rem;
  line-height: 2;
  color: var(--text-secondary);
  font-family: 'Courier New', monospace;
}
.breakdown-list .label { color: var(--text-secondary); }
.breakdown-list .value { color: var(--text-primary); font-weight: 600; }
.breakdown-list .multiplier { color: var(--accent-gold); }
.breakdown-list .divider {
  border: none;
  border-top: 1px solid rgba(255,255,255,0.06);
  margin: 6px 0;
}
.breakdown-list .final-line .value {
  color: var(--accent-cyan);
  font-size: 1rem;
}

/* ============ Element Effectiveness Badge ============ */
.effectiveness-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 6px;
  font-size: 0.75rem;
  font-weight: 600;
  margin-top: 4px;
}
.effectiveness-badge.super-effective {
  background: rgba(255,59,59,0.15);
  color: var(--accent-red);
  border: 1px solid rgba(255,59,59,0.3);
}
.effectiveness-badge.not-effective {
  background: rgba(100,100,200,0.1);
  color: var(--text-secondary);
  border: 1px solid rgba(100,100,200,0.2);
}
.effectiveness-badge.neutral {
  display: none;
}

/* ============ Modal ============ */
.modal-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.show { display: flex; }

.modal {
  background: var(--bg-secondary);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 32px;
  max-width: 700px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
}
.modal h2 {
  font-size: 1.2rem;
  font-weight: 500;
  margin-bottom: 20px;
  text-align: center;
  letter-spacing: 2px;
}

.spirit-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
}
.spirit-option {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.25s ease;
  text-align: center;
}
.spirit-option:hover {
  background: rgba(255,255,255,0.08);
  border-color: var(--accent-cyan);
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.spirit-option .emoji { font-size: 2.2rem; display: block; margin-bottom: 6px; }
.spirit-option .name { font-weight: 600; font-size: 0.95rem; margin-bottom: 2px; }
.spirit-option .mini-stats {
  font-size: 0.7rem;
  color: var(--text-secondary);
  margin-top: 6px;
}

.modal-close {
  display: block;
  margin: 20px auto 0;
  padding: 10px 32px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  color: var(--text-secondary);
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.3s;
}
.modal-close:hover {
  background: rgba(255,255,255,0.1);
  color: var(--text-primary);
}

/* ============ Animations ============ */
@keyframes seal-pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.02); opacity: 0.92; }
}

@keyframes kill-flash {
  0% { background: rgba(255,59,59,0.5); transform: scale(1.05); }
  100% { background: rgba(255,59,59,0.15); transform: scale(1); }
}

@keyframes screen-shake {
  0%, 100% { transform: translate(0, 0); }
  10% { transform: translate(-4px, -2px); }
  20% { transform: translate(4px, 2px); }
  30% { transform: translate(-3px, 3px); }
  40% { transform: translate(3px, -3px); }
  50% { transform: translate(-2px, 2px); }
  60% { transform: translate(2px, -1px); }
  70% { transform: translate(-1px, 1px); }
  80% { transform: translate(1px, -1px); }
  90% { transform: translate(-1px, 0px); }
}

.shake { animation: screen-shake 0.5s ease-out; }

@keyframes number-pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); }
}
.number-pop { animation: number-pop 0.3s ease-out; }

@keyframes flash-red {
  0% { opacity: 0.5; }
  100% { opacity: 0; }
}
#flash-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: radial-gradient(ellipse at center, rgba(255,50,50,0.4), transparent 70%);
  z-index: 50;
  pointer-events: none;
  opacity: 0;
}
#flash-overlay.flash {
  animation: flash-red 0.6s ease-out;
}

@keyframes float-in {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ============ Responsive ============ */
@media (max-width: 768px) {
  .battle-area {
    grid-template-columns: 1fr;
    gap: 16px;
  }
  .seal-container { padding-top: 0; }
  .spirit-panel { min-height: auto; }
  .result-percentage { font-size: 3rem; }
  .seal-wrapper { width: 160px; height: 160px; }
  .seal { width: 160px; height: 160px; }
  .seal-number { font-size: 2.2rem; }
  .seal-wrapper canvas { width: 240px; height: 240px; top: -40px; left: -40px; }
  .container { padding: 20px 16px 40px; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

// Element effectiveness: attacker -> defender -> multiplier

const SPIRITS = [

    ]

const DEFENSE_SKILLS = [
  { name: '无', reduction: 0, desc: '' },
  { name: '铁壁', reduction: 0.25, desc: '-25%' },

  { name: '坚岩守护', reduction: 0.35, desc: '-35%' }
];

// ============================================================
// STATE
// ============================================================
let state = {
  attacker: null,       // spirit object
  defender: null,       // spirit object
  attackSkill: null,    // skill object (index)
  attackSkillIdx: -1,
  defenseSkill: null,   // defense skill object
  defenseSkillIdx: 0,
  starLayer: 0,
  modalTarget: null     // 'attacker' or 'defender'
};

// ============================================================
// STAR BACKGROUND
// ============================================================
function initStarCanvas() {
  const canvas = document.getElementById('star-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];
  
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    initStars();
  }
  
  function initStars() {
    stars = [];
    const count = Math.floor((canvas.width * canvas.height) / 4000);
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5 + 0.3,
        alpha: Math.random() * 0.8 + 0.2,
        speed: Math.random() * 0.005 + 0.002
      });
    }
  }
  
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const time = Date.now() * 0.001;
    stars.forEach(s => {
      const a = s.alpha * (0.5 + 0.5 * Math.sin(time * s.speed * 100 + s.x));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,210,255,${a})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  
  window.addEventListener('resize', resize);
  resize();
  draw();
}

// ============================================================
// PARTICLE SYSTEM (around seal)
// ============================================================
let particles = [];
let particleCanvas, particleCtx;

function initParticles() {
  particleCanvas = document.getElementById('particle-canvas');
  particleCtx = particleCanvas.getContext('2d');
  animateParticles();
}

function spawnParticle() {
  const cx = 140, cy = 140;
  const angle = Math.random() * Math.PI * 2;
  const dist = 80 + Math.random() * 30;
  particles.push({
    x: cx + Math.cos(angle) * dist,
    y: cy + Math.sin(angle) * dist,
    vx: (Math.random() - 0.5) * 0.5,
    vy: (Math.random() - 0.5) * 0.5 - 0.3,
    life: 1,
    decay: 0.008 + Math.random() * 0.015,
    size: Math.random() * 2.5 + 1,
    hue: 40 + Math.random() * 20
  });
}

function animateParticles() {
  particleCtx.clearRect(0, 0, 280, 280);
  
  // Spawn based on layer
  const spawnRate = Math.floor(state.starLayer / 8);
  for (let i = 0; i < spawnRate; i++) {
    if (Math.random() < 0.3) spawnParticle();
  }
  
  particles.forEach((p, idx) => {
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    
    if (p.life <= 0) {
      particles.splice(idx, 1);
      return;
    }
    
    particleCtx.beginPath();
    particleCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    const lightness = state.starLayer > 70 ? 90 : 70;
    particleCtx.fillStyle = `hsla(${p.hue}, 100%, ${lightness}%, ${p.life * 0.8})`;
    particleCtx.fill();
  });
  
  // Limit particles
  if (particles.length > 80) particles.splice(0, particles.length - 80);
  
  requestAnimationFrame(animateParticles);
}

// ============================================================
// SEAL SVG GENERATION
// ============================================================
function generateSealSVG() {
  // Tick marks
  const ticks = document.getElementById('seal-ticks');
  let ticksHTML = '';
  for (let i = 0; i < 36; i++) {
    const angle = i * 10;
    const len = i % 3 === 0 ? 8 : 4;
    const r1 = 95;
    const r2 = r1 - len;
    const x1 = 100 + r1 * Math.cos(angle * Math.PI / 180);
    const y1 = 100 + r1 * Math.sin(angle * Math.PI / 180);
    const x2 = 100 + r2 * Math.cos(angle * Math.PI / 180);
    const y2 = 100 + r2 * Math.sin(angle * Math.PI / 180);
    ticksHTML += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="rgba(255,255,255,0.12)" stroke-width="0.8"/>`;
  }
  ticks.innerHTML = ticksHTML;
  
  // Rune pattern (hexagon-ish)
  const runes = document.getElementById('seal-runes');
  let runesHTML = '';
  for (let i = 0; i < 6; i++) {
    const angle = i * 60 - 90;
    const r = 70;
    const x = 100 + r * Math.cos(angle * Math.PI / 180);
    const y = 100 + r * Math.sin(angle * Math.PI / 180);
    const x2 = 100 + r * Math.cos((angle + 60) * Math.PI / 180);
    const y2 = 100 + r * Math.sin((angle + 60) * Math.PI / 180);
    runesHTML += `<line x1="${x}" y1="${y}" x2="${x2}" y2="${y2}" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>`;
    // Small dots at vertices
    runesHTML += `<circle cx="${x}" cy="${y}" r="2" fill="rgba(255,255,255,0.1)"/>`;
  }
  runes.innerHTML = runesHTML;
}

// ============================================================
// SEAL INTERACTION
// ============================================================
function initSealInteraction() {
  const wrapper = document.getElementById('seal-wrapper');
  const slider = document.getElementById('seal-slider');
  let isDragging = false;
  let startY = 0;
  let startLayer = 0;
  
  // Mouse drag
  wrapper.addEventListener('mousedown', (e) => {
    isDragging = true;
    startY = e.clientY;
    startLayer = state.starLayer;
    document.body.style.cursor = 'ns-resize';
    e.preventDefault();
  });
  
  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const dy = startY - e.clientY;
    const newLayer = Math.max(0, Math.min(99, startLayer + Math.round(dy / 4)));
    setStarLayer(newLayer);
  });
  
  document.addEventListener('mouseup', () => {
    isDragging = false;
    document.body.style.cursor = '';
  });
  
  // Touch drag
  wrapper.addEventListener('touchstart', (e) => {
    isDragging = true;
    startY = e.touches[0].clientY;
    startLayer = state.starLayer;
    e.preventDefault();
  }, { passive: false });
  
  document.addEventListener('touchmove', (e) => {
    if (!isDragging) return;
    const dy = startY - e.touches[0].clientY;
    const newLayer = Math.max(0, Math.min(99, startLayer + Math.round(dy / 4)));
    setStarLayer(newLayer);
  }, { passive: false });
  
  document.addEventListener('touchend', () => { isDragging = false; });
  
  // Scroll wheel
  wrapper.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? -1 : 1;
    setStarLayer(Math.max(0, Math.min(99, state.starLayer + delta)));
  }, { passive: false });
  
  // Slider
  slider.addEventListener('input', (e) => {
    setStarLayer(parseInt(e.target.value));
  });
  
  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowUp') setStarLayer(Math.min(99, state.starLayer + 1));
    if (e.key === 'ArrowDown') setStarLayer(Math.max(0, state.starLayer - 1));
  });
  
  // Double click to reset
  wrapper.addEventListener('dblclick', () => { setStarLayer(0); });
}

function setStarLayer(value) {
  const old = state.starLayer;
  state.starLayer = Math.round(value);
  
  // Update visuals
  const numberEl = document.getElementById('seal-number');
  const slider = document.getElementById('seal-slider');
  const bonus = document.getElementById('seal-bonus');
  
  animateNumber(numberEl, old, state.starLayer, 200);
  slider.value = state.starLayer;
  
  const mult = (1 + state.starLayer * 0.015).toFixed(2);
  bonus.textContent = `星陨加成: ×${mult}`;
  
  // Update seal glow
  updateSealGlow();
  
  // Pop animation on change
  if (old !== state.starLayer) {
    numberEl.classList.remove('number-pop');
    void numberEl.offsetWidth;
    numberEl.classList.add('number-pop');
  }
  
  calculateDamage();
}

function updateSealGlow() {
  const layer = state.starLayer;
  const t = layer / 99;
  
  // Color: from blue-ish to gold to white-hot
  let r, g, b;
  if (t < 0.5) {
    // Blue to gold
    const p = t / 0.5;
    r = Math.round(100 + 155 * p);
    g = Math.round(140 + 75 * p);
    b = Math.round(255 - 255 * p);
  } else {
    // Gold to white-hot
    const p = (t - 0.5) / 0.5;
    r = 255;
    g = Math.round(215 + 40 * p);
    b = Math.round(0 + 200 * p);
  }
  
  const glowSize = 8 + layer * 1.5;
  const glowAlpha = 0.15 + t * 0.5;
  const pulseSpeed = 3 - t * 2;
  
  const root = document.documentElement;
  root.style.setProperty('--seal-glow-color', `rgba(${r},${g},${b},${glowAlpha})`);
  root.style.setProperty('--seal-glow-size', `${glowSize}px`);
  root.style.setProperty('--seal-pulse-speed', `${pulseSpeed}s`);
  
  // SVG opacity
  const runes = document.getElementById('seal-runes');
  if (runes) runes.setAttribute('opacity', (0.2 + t * 0.8).toFixed(2));
  
  // Seal border glow for SVG circles
  const svgCircles = document.querySelectorAll('#seal-svg circle');
  svgCircles.forEach(c => {
    c.setAttribute('stroke', `rgba(${r},${g},${b},${0.05 + t * 0.15})`);
  });
}

// ============================================================
// NUMBER ANIMATION
// ============================================================
function animateNumber(el, from, to, duration) {
  const start = performance.now();
  const diff = to - from;
  
  function update(time) {
    const elapsed = time - start;
    const progress = Math.min(elapsed / duration, 1);
    // Ease out
    const eased = 1 - Math.pow(1 - progress, 3);
    const current = Math.round(from + diff * eased);
    el.textContent = current;
    if (progress < 1) requestAnimationFrame(update);
  }
  requestAnimationFrame(update);
}

// ============================================================
// MODAL
// ============================================================
function openModal(target) {
  state.modalTarget = target;
  const overlay = document.getElementById('modal-overlay');
  const title = document.getElementById('modal-title');
  const grid = document.getElementById('spirit-grid');
  
  title.textContent = target === 'attacker' ? '⚔️ 选择攻击方精灵' : '🛡️ 选择防御方精灵';
  
  grid.innerHTML = SPIRITS.map(s => `
    <div class="spirit-option ${ELEMENTS[s.element].cls}" onclick="selectSpirit('${s.id}')">
      <span class="emoji">${s.emoji}</span>
      <div class="name">${s.name}</div>
      <div class="mini-stats">
        <span class="element-tag" style="background:${ELEMENTS[s.element].color}20;color:${ELEMENTS[s.element].color};border:1px solid ${ELEMENTS[s.element].color}40;font-size:0.65rem;padding:1px 6px;border-radius:10px;">
          ${ELEMENTS[s.element].emoji} ${ELEMENTS[s.element].name}
        </span>
      </div>
      <div class="mini-stats">HP ${s.hp.toLocaleString()} · ATK ${s.atk} · DEF ${s.def}</div>
    </div>
  `).join('');
  
  overlay.classList.add('show');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
  state.modalTarget = null;
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function selectSpirit(id) {
  const spirit = SPIRITS.find(s => s.id === id);
  if (!spirit) return;
  
  if (state.modalTarget === 'attacker') {
    state.attacker = spirit;
    state.attackSkillIdx = 0;
    state.attackSkill = spirit.skills[0];
    renderSpiritCard('attacker');
  } else if (state.modalTarget === 'defender') {
    state.defender = spirit;
    state.defenseSkillIdx = 0;
    state.defenseSkill = DEFENSE_SKILLS[0];
    renderSpiritCard('defender');
  }
  
  closeModal();
  calculateDamage();
}

// ============================================================
// RENDER SPIRIT CARDS
// ============================================================
function renderSpiritCard(side) {
  const spirit = side === 'attacker' ? state.attacker : state.defender;
  const selectArea = document.getElementById(`${side}-select-area`);
  const skillsSection = document.getElementById(`${side}-skills`);
  const elInfo = ELEMENTS[spirit.element];
  
  selectArea.innerHTML = `
    <div class="spirit-card ${elInfo.cls}" onclick="openModal('${side}')" style="--el-color:${elInfo.color}">
      <span class="emoji">${spirit.emoji}</span>
      <div class="name">${spirit.name}</div>
      <span class="element-tag">${elInfo.emoji} ${elInfo.name}</span>
      <div class="stats">
        <div class="stat"><div class="stat-label">HP</div><div class="stat-value">${spirit.hp.toLocaleString()}</div></div>
        <div class="stat"><div class="stat-label">ATK</div><div class="stat-value">${spirit.atk}</div></div>
        <div class="stat"><div class="stat-label">DEF</div><div class="stat-value">${spirit.def}</div></div>
      </div>
      <div class="change-hint">点击更换</div>
    </div>
  `;
  
  skillsSection.style.display = 'block';
  renderSkills(side);
}

function renderSkills(side) {
  if (side === 'attacker') {
    const list = document.getElementById('attacker-skill-list');
    list.innerHTML = state.attacker.skills.map((skill, idx) => {
      const elInfo = ELEMENTS[skill.element];
      return `
        <button class="skill-btn ${idx === state.attackSkillIdx ? 'active' : ''}" 
                onclick="selectAttackSkill(${idx})">
          <span class="skill-name">${elInfo.emoji} ${skill.name}</span>
          <span class="skill-power">威力 ${skill.power}</span>
        </button>
      `;
    }).join('');
  } else {
    const list = document.getElementById('defender-skill-list');
    list.innerHTML = DEFENSE_SKILLS.map((skill, idx) => `
      <button class="skill-btn ${idx === state.defenseSkillIdx ? 'active' : ''} ${idx === 0 ? 'none-skill' : ''}" 
              onclick="selectDefenseSkill(${idx})">
        <span class="skill-name">${skill.name}</span>
        <span class="skill-power">${skill.desc || '—'}</span>
      </button>
    `).join('');
  }
}

function selectAttackSkill(idx) {
  state.attackSkillIdx = idx;
  state.attackSkill = state.attacker.skills[idx];
  renderSkills('attacker');
  calculateDamage();
}

function selectDefenseSkill(idx) {
  state.defenseSkillIdx = idx;
  state.defenseSkill = DEFENSE_SKILLS[idx];
  renderSkills('defender');
  calculateDamage();
}

// ============================================================
// DAMAGE CALCULATION
// ============================================================
function calculateDamage() {
  if (!state.attacker || !state.defender) {
    renderWaiting();
    return;
  }
  
  const atk = state.attacker;
  const def = state.defender;
  const skill = state.attackSkill;
  const defSkill = state.defenseSkill || DEFENSE_SKILLS[0];
  const layer = state.starLayer;
  
  // Base damage formula
  const atkStat = atk.atk;
  const defStat = def.def;
  const skillPower = skill.power;
  
  // Base = ATK^1.3 * skillPower * 2.5 / (DEF^0.8)
  const baseDamage = Math.round(
    Math.pow(atkStat, 1.3) * (skillPower / 80) * 2.5 / Math.pow(defStat, 0.8)
  );
  
  // Element effectiveness (skill element vs defender element)
  let elementMult = 1.0;
  const effChart = EFFECTIVENESS[skill.element];
  if (effChart && effChart[def.element]) {
    elementMult = effChart[def.element];
  }
  
  // Star-fall multiplier
  const starMult = 1 + layer * 0.015;
  
  // Defense skill reduction
  const defMult = 1 - defSkill.reduction;
  
  // Final damage
  const finalDamage = Math.round(baseDamage * elementMult * starMult * defMult);
  
  // HP percentage
  const hpPercent = (finalDamage / def.hp) * 100;
  const remainingHP = Math.max(0, def.hp - finalDamage);
  const remainingPercent = (remainingHP / def.hp) * 100;
  const isKill = finalDamage >= def.hp;
  const overflow = isKill ? finalDamage - def.hp : 0;
  
  // Render result
  renderResult({
    finalDamage, baseDamage, elementMult, starMult, defMult,
    hpPercent, remainingHP, remainingPercent, isKill, overflow,
    defHP: def.hp, skill, defSkill, atk, def
  });
  
  // Update atmosphere
  updateAtmosphere(hpPercent, isKill);
}

// ============================================================
// RENDER RESULT
// ============================================================
function renderResult(data) {
  const content = document.getElementById('result-content');
  const breakdownToggle = document.getElementById('breakdown-toggle');
  const breakdownList = document.getElementById('breakdown-list');
  
  // Determine HP bar color
  let barColor;
  if (data.isKill) barColor = '#ff3b3b';
  else if (data.remainingPercent < 25) barColor = '#ff3b3b';
  else if (data.remainingPercent < 50) barColor = '#ff8c00';
  else if (data.remainingPercent < 75) barColor = '#ffcc00';
  else barColor = '#00e676';
  
  document.documentElement.style.setProperty('--hp-bar-color', barColor);
  
  // Effectiveness badge
  let effBadge = '';
  if (data.elementMult > 1) {
    effBadge = `<div class="effectiveness-badge super-effective">效果拔群! ×${data.elementMult}</div>`;
  } else if (data.elementMult < 1) {
    effBadge = `<div class="effectiveness-badge not-effective">效果不佳 ×${data.elementMult}</div>`;
  }
  
  const displayPercent = Math.min(data.hpPercent, 999.9);
  
  content.innerHTML = `
    <div class="result-label">${data.isKill ? '💀 伤害结果' : '⚔️ 伤害结果'}</div>
    <div class="result-percentage" id="result-pct">
      ${displayPercent.toFixed(1)}<span class="percent-sign">%</span>
    </div>
    ${effBadge}
    <div class="hp-bar-container">
      <div class="hp-bar-bg">
        <div class="hp-bar-fill" style="width: ${data.remainingPercent}%; background: ${barColor};"></div>
        ${!data.isKill ? `<div class="hp-bar-damage" style="width: ${Math.min(data.hpPercent, 100)}%;"></div>` : ''}
        <div class="hp-bar-text">${data.remainingHP.toLocaleString()} / ${data.defHP.toLocaleString()} HP</div>
      </div>
    </div>
    <div class="result-numbers">
      造成 <span class="damage-value">${data.finalDamage.toLocaleString()}</span> 点伤害
      ${data.isKill ? '' : ` · 剩余 <span class="hp-value">${data.remainingHP.toLocaleString()}</span> HP`}
    </div>
    <div class="kill-banner ${data.isKill ? 'show' : ''}" id="kill-banner">
      ☠️ 确认击杀!
      ${data.overflow > 0 ? `<div class="overflow-damage">溢出伤害: ${data.overflow.toLocaleString()}</div>` : ''}
    </div>
  `;
  
  // Breakdown
  breakdownToggle.style.display = 'flex';
  breakdownList.innerHTML = `
    <div><span class="label">攻击力:</span> <span class="value">${data.atk.atk}</span></div>
    <div><span class="label">技能威力:</span> <span class="value">${data.skill.name} (${data.skill.power})</span></div>
    <div><span class="label">基础伤害:</span> <span class="value">${data.baseDamage.toLocaleString()}</span></div>
    <hr class="divider">
    <div><span class="label">属性克制:</span> <span class="multiplier">×${data.elementMult}</span>
      <span class="label" style="font-size:0.7rem"> (${ELEMENTS[data.skill.element].name} → ${ELEMENTS[data.def.element].name})</span></div>
    <div><span class="label">星陨加成:</span> <span class="multiplier">×${data.starMult.toFixed(3)}</span>
      <span class="label" style="font-size:0.7rem"> (${state.starLayer}层)</span></div>
    <div><span class="label">防御减伤:</span> <span class="multiplier">×${data.defMult.toFixed(2)}</span>
      <span class="label" style="font-size:0.7rem"> (${data.defSkill.name})</span></div>
    <hr class="divider">
    <div class="final-line"><span class="label">最终伤害:</span> <span class="value">${data.finalDamage.toLocaleString()}</span>
      <span class="label" style="font-size:0.7rem"> / ${data.defHP.toLocaleString()} HP (${data.hpPercent.toFixed(1)}%)</span></div>
  `;
  
  // Animate the percentage number
  const pctEl = document.getElementById('result-pct');
  if (pctEl) {
    pctEl.classList.remove('number-pop');
    void pctEl.offsetWidth;
    pctEl.classList.add('number-pop');
  }
  
  // Kill effects
  if (data.isKill) {
    triggerKillEffects();
  }
}

function renderWaiting() {
  const content = document.getElementById('result-content');
  let msg = '选择双方精灵后开始计算 ⚔️';
  if (state.attacker && !state.defender) msg = '选择防御方精灵以计算伤害 🛡️';
  if (!state.attacker && state.defender) msg = '选择攻击方精灵以计算伤害 ⚔️';
  content.innerHTML = `<div class="result-waiting">${msg}</div>`;
  document.getElementById('breakdown-toggle').style.display = 'none';
  document.getElementById('breakdown-content').classList.remove('open');
  
  // Reset atmosphere
  updateAtmosphere(0, false);
}

// ============================================================
// KILL EFFECTS
// ============================================================
let lastKillState = false;

function triggerKillEffects() {
  if (lastKillState) return; // Already triggered
  lastKillState = true;
  
  // Screen shake
  const container = document.getElementById('main-container');
  container.classList.add('shake');
  setTimeout(() => container.classList.remove('shake'), 500);
  
  // Flash overlay
  const flash = document.getElementById('flash-overlay');
  flash.classList.remove('flash');
  void flash.offsetWidth;
  flash.classList.add('flash');
}

function resetKillEffects() {
  lastKillState = false;
}

// ============================================================
// ATMOSPHERE SYSTEM
// ============================================================
function updateAtmosphere(damagePercent, isKill) {
  const root = document.documentElement;
  const overlay = document.getElementById('atmosphere-overlay');
  const card = document.getElementById('result-card');
  
  if (!state.attacker || !state.defender) {
    root.style.setProperty('--atmosphere-color', 'transparent');
    root.style.setProperty('--atmosphere-intensity', '0');
    card.style.borderColor = 'var(--glass-border)';
    card.style.boxShadow = 'none';
    resetKillEffects();
    return;
  }
  
  if (isKill) {
    root.style.setProperty('--atmosphere-color', 'rgba(255,30,30,0.15)');
    root.style.setProperty('--atmosphere-intensity', '1');
    card.style.borderColor = 'rgba(255,59,59,0.5)';
    card.style.boxShadow = '0 0 40px rgba(255,59,59,0.2), inset 0 0 40px rgba(255,59,59,0.05)';
    triggerKillEffects();
  } else if (damagePercent >= 75) {
    root.style.setProperty('--atmosphere-color', 'rgba(255,140,0,0.1)');
    root.style.setProperty('--atmosphere-intensity', '1');
    card.style.borderColor = 'rgba(255,140,0,0.3)';
    card.style.boxShadow = '0 0 30px rgba(255,140,0,0.1)';
    resetKillEffects();
  } else if (damagePercent >= 50) {
    root.style.setProperty('--atmosphere-color', 'rgba(255,200,0,0.06)');
    root.style.setProperty('--atmosphere-intensity', '1');
    card.style.borderColor = 'rgba(255,200,0,0.2)';
    card.style.boxShadow = '0 0 20px rgba(255,200,0,0.05)';
    resetKillEffects();
  } else if (damagePercent >= 25) {
    root.style.setProperty('--atmosphere-color', 'rgba(0,230,118,0.03)');
    root.style.setProperty('--atmosphere-intensity', '1');
    card.style.borderColor = 'var(--glass-border)';
    card.style.boxShadow = 'none';
    resetKillEffects();
  } else {
    root.style.setProperty('--atmosphere-color', 'transparent');
    root.style.setProperty('--atmosphere-intensity', '0');
    card.style.borderColor = 'var(--glass-border)';
    card.style.boxShadow = 'none';
    resetKillEffects();
  }
}

// ============================================================
// BREAKDOWN TOGGLE
// ============================================================
function toggleBreakdown() {
  const content = document.getElementById('breakdown-content');
  const toggle = document.getElementById('breakdown-toggle');
  content.classList.toggle('open');
  toggle.classList.toggle('open');
}

// ============================================================
// INIT
// ============================================================
function init() {
  initStarCanvas();
  generateSealSVG();
  initParticles();
  initSealInteraction();
  updateSealGlow();
  renderWaiting();
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
